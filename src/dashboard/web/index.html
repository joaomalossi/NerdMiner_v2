<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NerdMiner Dashboard</title>
<style>
:root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --dim:#8b949e;
        --ok:#3fb950; --bad:#f85149; --accent:#f0883e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,sans-serif;
       padding:24px; max-width:900px; margin:0 auto; }
h1 { font-size:1.2rem; font-weight:600; margin-bottom:16px; }
h1 span { color:var(--accent); }
#cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; }
.card.offline { opacity:.55; border-color:var(--bad); }
.card h2 { font-size:.95rem; text-transform:uppercase; letter-spacing:.06em; display:flex;
           align-items:center; gap:8px; margin-bottom:12px; }
.dot { width:10px; height:10px; border-radius:50%; background:var(--bad); flex:none; }
.card.online .dot { background:var(--ok); }
.hr { font-size:2.1rem; font-weight:700; margin-bottom:2px; }
.hr small { font-size:1rem; font-weight:400; color:var(--dim); }
.offmsg { color:var(--bad); font-size:.9rem; margin:8px 0; display:none; }
.card.offline .offmsg { display:block; }
.chart { width:100%; height:56px; margin-top:10px; display:block; }
.restart { margin-top:10px; background:none; border:1px solid var(--border); color:var(--dim);
           border-radius:6px; padding:5px 10px; font-size:.75rem; cursor:pointer; }
.restart:hover { border-color:var(--bad); color:var(--bad); }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; margin-top:12px; font-size:.85rem; }
.grid div { display:flex; justify-content:space-between; gap:8px; border-bottom:1px solid var(--border); padding:3px 0; }
.grid span:first-child { color:var(--dim); cursor:help; text-decoration:underline dotted; text-underline-offset:3px; text-decoration-color:#3a4250; }
footer { margin-top:18px; color:var(--dim); font-size:.75rem; }
</style>
</head>
<body>
<h1><span>⛏</span> NerdMiner Dashboard</h1>
<div id="cards"></div>
<div class="card" id="pool" style="margin-top:16px">
  <h2 title="Dados da conta inteira na Public Pool (as duas placas somadas, mesmo endereço de payout). Atualiza a cada 60s."><span class="dot" id="pool-dot"></span>Conta na Public Pool</h2>
  <div class="grid">
    <div><span title="Total de shares que a pool já aceitou da conta, desde sempre (as duas placas juntas).">Shares aceitos (total)</span><span data-p="totalShares">—</span></div>
    <div><span title="Recorde histórico de dificuldade da conta na pool — o mais perto que já chegamos de um bloco.">Best diff (histórica)</span><span data-p="bestDiff">—</span></div>
    <div><span title="Quando a pool aceitou o último share da conta. Intervalos de horas são normais (~1 share a cada 3,4h por placa).">Último share</span><span data-p="lastShare">—</span></div>
    <div><span title="Hashrate estimado pela pool a partir dos shares da última hora. Como os shares são raros, 0 na maior parte do tempo é NORMAL — não significa placa offline (as placas ao lado são a fonte confiável).">Hashrate (última hora)</span><span data-p="hrHour">—</span></div>
  </div>
</div>
<footer id="foot"></footer>
<script>
"use strict";
const POLL_MS = 7000, TIMEOUT_MS = 3000;

function fetchTimeout(url, ms, opts = {}) {
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), ms);
  return fetch(url, { ...opts, signal: ctl.signal }).finally(() => clearTimeout(t));
}

function fmtUptime(s) {
  const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60);
  return (d ? d+"d " : "") + h + "h " + m + "m";
}

function cardHtml(id) {
  return `<div class="card" id="card-${id}">
    <h2><span class="dot" title="Verde: placa respondendo. Vermelho: sem resposta há mais de um ciclo (~7s) — offline, travada ou fora da rede."></span><span class="title">${id}</span></h2>
    <div class="hr" title="Velocidade de mineração ao vivo: tentativas de hash por segundo. O normal deste ESP32 é ~350–355 KH/s. Atualiza a cada 7s (medição em janela de 10s na placa)."><span class="val">—</span> <small>KH/s</small></div>
    <div class="offmsg">sem resposta — placa offline ou fora da rede</div>
    <canvas class="chart" height="56" title="Hashrate das últimas 24h — 1 ponto por minuto, guardado na RAM da placa. Zera quando a placa reinicia (gráfico curto = reboot recente)."></canvas>
    <button class="restart" data-b="${id}">reiniciar placa</button>
    <div class="grid">
      <div><span title="Provas de trabalho aceitas pela pool desde o último reboot. Com ~355 KH/s e dificuldade 1, o esperado é ~1 share a cada 3,4 horas — zero por longos períodos é normal.">Shares</span><span data-f="shares">—</span></div>
      <div><span title="Maior dificuldade de hash que a placa encontrou desde o reboot (sorte pura). Pra achar um bloco de verdade precisaria de ~127 trilhões.">Best diff</span><span data-f="bestDiff">—</span></div>
      <div><span title="Modelos de bloco novos recebidos da pool (mining.notify). Subindo constantemente = conexão com a pool viva e saudável.">Templates</span><span data-f="templates">—</span></div>
      <div><span title="Tempo desde o último reboot da placa. Zerou sem você pedir = queda de energia, crash ou update OTA.">Uptime</span><span data-f="uptime">—</span></div>
      <div><span title="Endereço:porta de stratum configurados. 13333 = shared/PPLNS (recompensa dividida proporcional); 21496 ou 3333 = solo (100% do bloco se achar).">Pool</span><span data-f="pool">—</span></div>
      <div><span title="Versão do firmware instalada. As placas se atualizam sozinhas (self-OTA A/B) quando sai release nova no fork.">Firmware</span><span data-f="version">—</span></div>
      <div><span title="Potência do sinal Wi-Fi (RSSI). Mais perto de 0 é melhor: até -67 dBm ótimo, -70s aceitável, abaixo de -80 instável (downloads de OTA podem falhar).">Wi-Fi</span><span data-f="rssi">—</span></div>
      <div><span title="Memória RAM livre do ESP32. O valor importa menos que a estabilidade: caindo sem parar = vazamento de memória.">Heap livre</span><span data-f="heap">—</span></div>
      <div><span title="Temperatura interna do chip (sensor pouco preciso — a tendência importa mais que o valor absoluto). 50–60 °C minerando é normal.">Temp</span><span data-f="temp">—</span></div>
    </div>
  </div>`;
}

function renderStats(id, s) {
  const c = document.getElementById("card-" + id);
  c.classList.add("online"); c.classList.remove("offline");
  c.querySelector(".title").textContent = s.mode.toUpperCase() + " · " + id;
  c.querySelector(".hr .val").textContent = s.hashRateKHs.toFixed(1);
  const f = (n, v) => c.querySelector(`[data-f="${n}"]`).textContent = v;
  f("shares", s.shares);
  f("bestDiff", s.bestDiff);
  f("templates", s.templates);
  f("uptime", fmtUptime(s.uptimeSeconds));
  f("pool", s.pool + ":" + s.port);
  f("version", s.version);
  f("rssi", s.rssi + " dBm");
  f("heap", Math.round(s.freeHeap/1024) + " KB");
  f("temp", s.tempC.toFixed(0) + " °C");
}

function renderOffline(id) {
  const c = document.getElementById("card-" + id);
  c.classList.add("offline"); c.classList.remove("online");
}

// As duas placas conhecidas; acessando por IP (sem mDNS), a própria vira um card extra.
const boards = ["nerdminer-solo.local", "nerdminer-shared.local"];
if (!boards.includes(location.host)) boards.unshift(location.host);
const cardsEl = document.getElementById("cards");
boards.forEach(b => cardsEl.insertAdjacentHTML("beforeend", cardHtml(b)));

let btcAddress = null;

async function poll() {
  for (const b of boards) {
    try {
      const r = await fetchTimeout(`http://${b}/api/stats`, TIMEOUT_MS);
      const s = await r.json();
      renderStats(b, s);
      if (s.btcAddress) btcAddress = s.btcAddress;
    } catch (e) { renderOffline(b); }
  }
  document.getElementById("foot").textContent = "atualizado " + new Date().toLocaleTimeString();
}

const POOL_API = "https://public-pool.io:40557/api/client/";
async function pollPool() {
  const el = document.getElementById("pool");
  if (!btcAddress) { setTimeout(pollPool, 5000); return; }
  try {
    const r = await fetchTimeout(POOL_API + btcAddress, 10000);
    const d = await r.json();
    const a = d.accounting || {};
    const f = (n, v) => el.querySelector(`[data-p="${n}"]`).textContent = v;
    f("totalShares", a.totalAcceptedShares ?? "—");
    f("bestDiff", Number(d.bestDifficulty).toFixed(2));
    f("lastShare", a.latestShareAt ? new Date(a.latestShareAt).toLocaleString() : "—");
    f("hrHour", a.hashRateLastHour ? (a.hashRateLastHour/1000).toFixed(0) + " KH/s" : "0");
    el.classList.add("online"); el.classList.remove("offline");
  } catch (e) { el.classList.add("offline"); el.classList.remove("online"); }
  setTimeout(pollPool, 60000);
}

// Gráfico das últimas 24h (uma amostra de hashrate por minuto, vinda do /api/history)
function drawChart(id, data) {
  const cv = document.getElementById("card-" + id).querySelector("canvas");
  const w = cv.clientWidth || 300;
  cv.width = w;
  const hgt = cv.height;
  const ctx = cv.getContext("2d");
  ctx.clearRect(0, 0, w, hgt);
  if (!data.length) return;
  const max = Math.max(...data, 1);
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = i / Math.max(data.length - 1, 1) * (w - 2) + 1;
    const y = hgt - 2 - (v / max) * (hgt - 6);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.strokeStyle = "#f0883e";
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

async function pollHistory() {
  for (const b of boards) {
    try {
      const r = await fetchTimeout(`http://${b}/api/history`, TIMEOUT_MS);
      drawChart(b, await r.json());
    } catch (e) { /* placa offline: gráfico fica vazio */ }
  }
  setTimeout(pollHistory, 60000);
}

cardsEl.addEventListener("click", async (ev) => {
  const btn = ev.target.closest(".restart");
  if (!btn) return;
  const b = btn.dataset.b;
  if (!confirm(`Reiniciar a placa ${b}? Ela volta a minerar sozinha em ~30s.`)) return;
  try { await fetchTimeout(`http://${b}/api/restart`, TIMEOUT_MS, { method: "POST" }); } catch (e) {}
  renderOffline(b);
});

poll();
setInterval(poll, POLL_MS);
pollPool();
pollHistory();
</script>
</body>
</html>
